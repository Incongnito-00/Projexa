<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Projects | Projexa</title>

<link rel="stylesheet" href="../css/main.css">

<style>

body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#f4f7fb;
}

.navbar{
    background:#4F46E5;
    color:white;
    padding:18px 35px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.navbar h2{
    margin:0;
}

.back-btn{
    color:white;
    text-decoration:none;
    background:rgba(255,255,255,.2);
    padding:10px 18px;
    border-radius:8px;
}

.container{
    width:90%;
    margin:30px auto;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.header h1{
    margin:0;
}

.create-btn{
    background:#10B981;
    color:white;
    text-decoration:none;
    padding:12px 20px;
    border-radius:8px;
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
    margin-bottom:30px;
}

.stat-card{
    background:white;
    border-radius:12px;
    padding:20px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.stat-card h2{
    color:#4F46E5;
    font-size:32px;
    margin-bottom:8px;
}

#projects{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:12px;
    padding:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.card h2{
    margin-top:0;
    color:#4F46E5;
}

.card p{
    margin:8px 0;
}

.project-buttons{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:20px;
}

.project-buttons button{
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
    color:white;
}

.project-buttons button:nth-child(1){
    background:#2563EB;
}

.project-buttons button:nth-child(2){
    background:#F59E0B;
}

.project-buttons button:nth-child(3){
    background:#EF4444;
}

</style>

</head>

<body>

<div class="navbar">

<h2>🚀 PROJEXA</h2>

<a href="dashboard.html" class="back-btn">

← Dashboard

</a>

</div>

<div class="container">

<div class="header">

<h1>📁 My Projects</h1>

<a href="post-project.html" class="create-btn">

➕ Create New Project

</a>

</div>

<div class="stats">

<div class="stat-card">

<h2 id="totalProjects">0</h2>

<p>Total Projects</p>

</div>

<div class="stat-card">

<h2>Open</h2>

<p>Current Status</p>

</div>

<div class="stat-card">

<h2>Owner</h2>

<p>Your Projects</p>

</div>

</div>

<div id="projects">

Loading Projects...

</div>

</div>

<script src="../js/my-projects.js"></script>

<script>

const oldLoad = loadProjects;

loadProjects = async function(){

    await oldLoad();

    const cards = document.querySelectorAll(".card");

    document.getElementById("totalProjects").innerText = cards.length;

}

loadProjects();

</script>

</body>

</html>
