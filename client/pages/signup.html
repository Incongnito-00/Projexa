<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Sign Up | Projexa</title>

<link rel="stylesheet"
href="../css/main.css">

<link rel="stylesheet"
href="../css/responsive.css">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap"
rel="stylesheet">

</head>

<body>

<section class="login-page">

<div class="login-box">

<h1>

Create Account

</h1>

<p>

Join Projexa today

</p>

<form id="signupForm">

<input
type="text"
id="fullname"
placeholder="Full Name"
required>

<input
type="email"
id="email"
placeholder="Email Address"
required>

<input
type="password"
id="password"
placeholder="Password"
required>

<input
type="password"
id="confirmPassword"
placeholder="Confirm Password"
required>

<button type="submit">

Create Account

</button>

</form>

<p class="bottom-text">

Already have an account?

<a href="login.html">

Login

</a>

</p>

</div>

</section>

<script src="../js/signup.js"></script>

</body>

</html>
