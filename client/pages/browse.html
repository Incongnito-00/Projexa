<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Browse Projects | Projexa</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../css/dashboard.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#090909;
color:#fff;
}

a{
text-decoration:none;
color:inherit;
}

.wrapper{
display:flex;
min-height:100vh;
}

.sidebar{
width:260px;
background:#111;
border-right:1px solid #222;
padding:25px;
position:fixed;
left:0;
top:0;
bottom:0;
overflow:auto;
}

.logo{
font-size:28px;
font-weight:800;
color:#A6FF00;
margin-bottom:40px;
}

.menu{
display:flex;
flex-direction:column;
gap:12px;
}

.menu a{
padding:14px 18px;
border-radius:10px;
transition:.3s;
color:#ddd;
font-weight:500;
}

.menu a:hover{
background:#1d1d1d;
color:#A6FF00;
}

.menu a.active{
background:#A6FF00;
color:#000;
font-weight:700;
}

.main{
margin-left:260px;
width:calc(100% - 260px);
padding:35px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:20px;
margin-bottom:30px;
}

.topbar h1{
font-size:34px;
font-weight:800;
}

.search{
display:flex;
gap:15px;
flex-wrap:wrap;
}

.search input{

width:320px;
padding:14px;
border:none;
outline:none;
border-radius:10px;
background:#171717;
color:#fff;

}

.search select{

padding:14px;
background:#171717;
color:#fff;
border:none;
border-radius:10px;

}

.stats{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:35px;

}

.card{

background:#141414;
border:1px solid #242424;
padding:25px;
border-radius:16px;

}

.card h2{

font-size:32px;
color:#A6FF00;
margin-bottom:8px;

}

.card p{

color:#aaa;

}

.projects{

display:grid;
grid-template-columns:repeat(auto-fill,minmax(330px,1fr));
gap:25px;

}

.project{

background:#131313;
border-radius:18px;
border:1px solid #222;
overflow:hidden;
transition:.3s;

}

.project:hover{

transform:translateY(-5px);
border-color:#A6FF00;

}

.banner{

height:180px;
background:linear-gradient(135deg,#1a1a1a,#292929);

}

.content{

padding:22px;

}

.content h3{

margin-bottom:12px;
font-size:23px;

}

.content p{

color:#aaa;
line-height:1.7;
margin-bottom:15px;

}

.tags{

display:flex;
flex-wrap:wrap;
gap:8px;
margin-bottom:18px;

}

.tag{

padding:6px 12px;
border-radius:20px;
background:#202020;
font-size:13px;
color:#A6FF00;

}

.meta{

display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:18px;
color:#999;
font-size:14px;

}

.btn{

display:inline-block;
padding:12px 22px;
background:#A6FF00;
color:#000;
font-weight:700;
border-radius:10px;
transition:.3s;

}

.btn:hover{

transform:scale(1.05);

}

.load{

margin-top:45px;
display:flex;
justify-content:center;

}

.load button{

padding:15px 35px;
border:none;
background:#A6FF00;
font-size:16px;
font-weight:700;
border-radius:10px;
cursor:pointer;

}

@media(max-width:900px){

.sidebar{

position:relative;
width:100%;
height:auto;

}

.main{

margin:0;
width:100%;

}

.wrapper{

flex-direction:column;

}

.search input{

width:100%;

}

}

</style>

</head>

<body>

<div class="wrapper">

<div class="sidebar">

<div class="logo">

PROJEXA

</div>

<div class="menu">

<a href="dashboard.html">Dashboard</a>

<a href="browse.html" class="active">Browse Projects</a>

<a href="post-project.html">Post Project</a>

<a href="applications.html">Applications</a>

<a href="profile.html">Profile</a>

<a href="settings.html">Settings</a>

<a href="../index.html">Logout</a>

</div>

</div>

<div class="main">

<div class="topbar">

<h1>Browse Projects</h1>

<div class="search">

<input
id="searchInput"
type="text"
placeholder="Search projects..."
>

<select id="categoryFilter">

<option value="">All Categories</option>

<option>Web Development</option>

<option>Mobile Apps</option>

<option>AI</option>

<option>Machine Learning</option>

<option>IoT</option>

<option>Cyber Security</option>

<option>Mechanical</option>

<option>Electronics</option>

<option>Embedded Systems</option>

</select>

</div>

</div>

<div class="stats">

<div class="card">

<h2 id="totalProjects">0</h2>

<p>Total Projects</p>

</div>

<div class="card">

<h2 id="openProjects">0</h2>

<p>Open Opportunities</p>

</div>

<div class="card">

<h2 id="categories">0</h2>

<p>Categories</p>

</div>

<div class="card">

<h2 id="developers">0</h2>

<p>Creators</p>

</div>

</div>

<div
class="projects"
id="projectsContainer"
>

</div>

<div class="load">

<button id="loadMore">

Load More

</button>

</div>

</div>

</div>

<script src="../js/config.js"></script>
<script src="../js/browse.js"></script>

</body>
</html>
