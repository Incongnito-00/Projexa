<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Applications | Projexa</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#090909;
color:#fff;
}

.wrapper{
display:flex;
min-height:100vh;
}

.sidebar{
width:260px;
background:#111;
border-right:1px solid #222;
padding:25px;
position:fixed;
left:0;
top:0;
bottom:0;
}

.logo{
font-size:28px;
font-weight:800;
color:#A6FF00;
margin-bottom:40px;
}

.menu{
display:flex;
flex-direction:column;
gap:12px;
}

.menu a{
text-decoration:none;
padding:14px 18px;
border-radius:10px;
color:#ddd;
transition:.3s;
}

.menu a:hover{
background:#1c1c1c;
color:#A6FF00;
}

.menu a.active{
background:#A6FF00;
color:#000;
font-weight:700;
}

.main{
margin-left:260px;
width:calc(100% - 260px);
padding:40px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
margin-bottom:30px;
gap:20px;
}

.header h1{
font-size:38px;
font-weight:800;
}

.refresh{
padding:14px 24px;
background:#A6FF00;
color:#000;
font-weight:700;
border:none;
border-radius:10px;
cursor:pointer;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:35px;
}

.stat{
background:#131313;
border:1px solid #222;
border-radius:18px;
padding:25px;
}

.stat h2{
font-size:32px;
color:#A6FF00;
margin-bottom:8px;
}

.stat p{
color:#999;
}

.list{
display:flex;
flex-direction:column;
gap:20px;
}

.application{
background:#131313;
border:1px solid #222;
border-radius:18px;
padding:25px;
transition:.3s;
}

.application:hover{
border-color:#A6FF00;
}

.top{
display:flex;
justify-content:space-between;
flex-wrap:wrap;
gap:20px;
margin-bottom:20px;
}

.projectTitle{
font-size:24px;
font-weight:700;
}

.user{
color:#999;
margin-top:5px;
}

.badge{
padding:8px 15px;
border-radius:20px;
font-weight:700;
}

.pending{
background:#665500;
color:#ffd83d;
}

.accepted{
background:#124d1f;
color:#66ff8d;
}

.rejected{
background:#501515;
color:#ff8c8c;
}

.description{
color:#cfcfcf;
line-height:1.8;
margin-bottom:20px;
}

.bottom{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:20px;
}

.date{
color:#888;
}

.actions{
display:flex;
gap:12px;
}

.actions button{
padding:12px 18px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:700;
}

.accept{
background:#A6FF00;
color:#000;
}

.reject{
background:#d63d3d;
color:#fff;
}

.empty{
text-align:center;
padding:100px 20px;
color:#888;
font-size:20px;
}

@media(max-width:900px){

.sidebar{
position:relative;
width:100%;
height:auto;
}

.wrapper{
flex-direction:column;
}

.main{
margin:0;
width:100%;
}

}

</style>

</head>

<body>

<div class="wrapper">

<div class="sidebar">

<div class="logo">

PROJEXA

</div>

<div class="menu">

<a href="dashboard.html">Dashboard</a>

<a href="browse.html">Browse Projects</a>

<a href="post-project.html">Post Project</a>

<a href="applications.html" class="active">Applications</a>

<a href="profile.html">Profile</a>

<a href="settings.html">Settings</a>

<a href="../index.html">Logout</a>

</div>

</div>

<div class="main">

<div class="header">

<h1>Applications</h1>

<button
class="refresh"
id="refreshBtn">

Refresh

</button>

</div>

<div class="stats">

<div class="stat">

<h2 id="totalApplications">

0

</h2>

<p>Total Applications</p>

</div>

<div class="stat">

<h2 id="pendingApplications">

0

</h2>

<p>Pending</p>

</div>

<div class="stat">

<h2 id="acceptedApplications">

0

</h2>

<p>Accepted</p>

</div>

<div class="stat">

<h2 id="rejectedApplications">

0

</h2>

<p>Rejected</p>

</div>

</div>

<div
id="applicationList"
class="list">

</div>

</div>

</div>

<script src="../js/config.js"></script>
<script src="../js/applications.js"></script>

</body>

</html>
