<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Projexa Dashboard</title>

<link rel="stylesheet" href="../css/main.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f7fc;
}

nav{
background:#4F46E5;
color:white;
padding:18px 35px;
display:flex;
justify-content:space-between;
align-items:center;
}

nav h2{
font-size:28px;
}

nav button{
background:#ef4444;
color:white;
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
font-size:15px;
}

.container{
width:90%;
margin:30px auto;
}

#welcome{
margin-bottom:30px;
color:#333;
}

.stats{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:20px;

margin-bottom:35px;

}

.stat-card{

background:white;

padding:25px;

border-radius:12px;

text-align:center;

box-shadow:0 5px 15px rgba(0,0,0,.08);

}

.stat-card h2{

color:#4F46E5;

font-size:35px;

margin-bottom:10px;

}

.actions{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:20px;

margin-bottom:40px;

}

.actions button{

width:100%;

padding:16px;

background:#4F46E5;

color:white;

border:none;

border-radius:10px;

cursor:pointer;

font-size:16px;

transition:.3s;

}

.actions button:hover{

background:#4338CA;

}

.card{

background:white;

padding:20px;

margin-top:20px;

border-radius:12px;

box-shadow:0 5px 15px rgba(0,0,0,.08);

}

.card h2{

margin-bottom:10px;

}

.card button{

margin-top:15px;

padding:10px 18px;

background:#10B981;

color:white;

border:none;

border-radius:8px;

cursor:pointer;

}

</style>

</head>

<body>

<nav>

<h2>🚀 PROJEXA</h2>

<button id="logoutBtn">

Logout

</button>

</nav>

<div class="container">

<h1 id="welcome">

Welcome

</h1>

<div class="stats">

<div class="stat-card">

<h2 id="projectCount">

0

</h2>

<p>

Projects Created

</p>

</div>

<div class="stat-card">

<h2 id="applicationCount">

0

</h2>

<p>

Applications

</p>

</div>

<div class="stat-card">

<h2 id="activeCount">

0

</h2>

<p>

Active Projects

</p>

</div>

</div>

<div class="actions">

<button onclick="window.location.href='post-project.html'">

➕ Create Project

</button>

<button onclick="window.location.href='browse.html'">

📂 Browse Projects

</button>

<button onclick="window.location.href='my-projects.html'">

📁 My Projects

</button>

<button onclick="window.location.href='my-applications.html'">

📨 My Applications

</button>

<button onclick="window.location.href='profile.html'">

👤 Profile

</button>

</div>

<h2>

Recent Projects

</h2>

<div id="projects">

Loading...

</div>

</div>

<script src="../js/dashboard.js"></script>

</body>

</html>
