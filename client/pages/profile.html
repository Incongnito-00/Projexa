<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Profile | Projexa</title>

<link rel="stylesheet" href="../css/main.css">

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#f4f7fb;
}

.navbar{
background:#4F46E5;
color:white;
padding:18px 30px;
display:flex;
justify-content:space-between;
align-items:center;
}

.navbar a{
color:white;
text-decoration:none;
background:rgba(255,255,255,.2);
padding:10px 18px;
border-radius:8px;
}

.container{
width:90%;
max-width:900px;
margin:40px auto;
}

.profile-card{

background:white;
padding:35px;
border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,.08);

}

.profile-top{

display:flex;
align-items:center;
gap:30px;
margin-bottom:30px;

}

.avatar{

width:120px;
height:120px;
border-radius:50%;
background:#4F46E5;
color:white;
display:flex;
justify-content:center;
align-items:center;
font-size:45px;
font-weight:bold;

}

.info h1{
margin:0;
}

.info p{
color:#666;
margin-top:8px;
}

.form-group{
margin-bottom:18px;
}

label{
display:block;
font-weight:bold;
margin-bottom:8px;
}

input,
textarea{

width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
font-size:15px;

}

textarea{

height:100px;
resize:none;

}

button{

margin-top:20px;
padding:14px 25px;
background:#4F46E5;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;

}

button:hover{

background:#4338CA;

}

</style>

</head>

<body>

<div class="navbar">

<h2>👤 My Profile</h2>

<a href="dashboard.html">

← Dashboard

</a>

</div>

<div class="container">

<div class="profile-card">

<div class="profile-top">

<div class="avatar" id="avatar">

U

</div>

<div class="info">

<h1 id="name">

Loading...

</h1>

<p id="email">

Loading...

</p>

</div>

</div>

<div class="form-group">

<label>College</label>

<input id="college"
placeholder="College Name">

</div>

<div class="form-group">

<label>Department</label>

<input id="department"
placeholder="Mechanical / CSE / ECE">

</div>

<div class="form-group">

<label>Skills</label>

<input id="skills"
placeholder="ESP32, Arduino, AI, CAD...">

</div>

<div class="form-group">

<label>GitHub</label>

<input id="github"
placeholder="https://github.com/...">

</div>

<div class="form-group">

<label>LinkedIn</label>

<input id="linkedin"
placeholder="https://linkedin.com/in/...">

</div>

<div class="form-group">

<label>About Me</label>

<textarea id="about"></textarea>

</div>

<button onclick="saveProfile()">

💾 Save Profile

</button>

</div>

</div>

<script src="../js/profile.js"></script>

</body>

</html>
