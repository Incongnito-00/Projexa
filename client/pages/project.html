<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Project | Projexa</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#090909;
color:#fff;
}

a{
text-decoration:none;
color:inherit;
}

.wrapper{
display:flex;
min-height:100vh;
}

.sidebar{

width:260px;
background:#111;
border-right:1px solid #222;
padding:25px;
position:fixed;
left:0;
top:0;
bottom:0;

}

.logo{

font-size:28px;
font-weight:800;
color:#A6FF00;
margin-bottom:40px;

}

.menu{

display:flex;
flex-direction:column;
gap:12px;

}

.menu a{

padding:14px 18px;
border-radius:10px;
color:#ddd;
transition:.3s;

}

.menu a:hover{

background:#1f1f1f;
color:#A6FF00;

}

.main{

margin-left:260px;
width:calc(100% - 260px);
padding:40px;

}

.hero{

height:280px;
border-radius:20px;
background:linear-gradient(135deg,#1a1a1a,#2d2d2d);
margin-bottom:30px;

}

.card{

background:#131313;
border:1px solid #222;
border-radius:18px;
padding:30px;
margin-bottom:25px;

}

.title{

font-size:36px;
font-weight:800;
margin-bottom:10px;

}

.subtitle{

color:#999;
margin-bottom:20px;

}

.tags{

display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;

}

.tag{

background:#202020;
color:#A6FF00;
padding:8px 14px;
border-radius:20px;
font-size:14px;

}

.info{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:20px;

}

.infoBox{

background:#181818;
padding:20px;
border-radius:14px;

}

.infoBox h4{

margin-bottom:8px;
color:#A6FF00;

}

.description{

line-height:1.9;
color:#d0d0d0;
font-size:16px;

}

.sectionTitle{

font-size:24px;
margin-bottom:20px;
font-weight:700;

}

.skills{

display:flex;
gap:10px;
flex-wrap:wrap;

}

.skill{

padding:10px 18px;
background:#1d1d1d;
border-radius:30px;
color:#A6FF00;

}

.actions{

display:flex;
gap:20px;
flex-wrap:wrap;
margin-top:30px;

}

.btn{

padding:14px 28px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
font-weight:700;

}

.apply{

background:#A6FF00;
color:#000;

}

.back{

background:#1c1c1c;
color:#fff;

}

.owner{

display:flex;
align-items:center;
gap:20px;

}

.avatar{

width:80px;
height:80px;
border-radius:50%;
background:#2b2b2b;

}

.ownerName{

font-size:22px;
font-weight:700;

}

.ownerRole{

color:#999;
margin-top:5px;

}

.loading{

text-align:center;
padding:100px;
font-size:20px;
color:#999;

}

@media(max-width:900px){

.sidebar{

position:relative;
width:100%;
height:auto;

}

.wrapper{

flex-direction:column;

}

.main{

margin:0;
width:100%;

}

}

</style>

</head>

<body>

<div class="wrapper">

<div class="sidebar">

<div class="logo">

PROJEXA

</div>

<div class="menu">

<a href="dashboard.html">Dashboard</a>

<a href="browse.html">Browse Projects</a>

<a href="post-project.html">Post Project</a>

<a href="applications.html">Applications</a>

<a href="profile.html">Profile</a>

<a href="settings.html">Settings</a>

<a href="../index.html">Logout</a>

</div>

</div>

<div class="main">

<div id="loading" class="loading">

Loading Project...

</div>

<div id="projectContainer" style="display:none;">

<div class="hero"></div>

<div class="card">

<h1 class="title" id="title"></h1>

<div class="subtitle" id="creator"></div>

<div class="tags" id="tags"></div>

<div class="info">

<div class="infoBox">

<h4>Category</h4>

<p id="category"></p>

</div>

<div class="infoBox">

<h4>Difficulty</h4>

<p id="level"></p>

</div>

<div class="infoBox">

<h4>Status</h4>

<p id="status"></p>

</div>

<div class="infoBox">

<h4>Created</h4>

<p id="created"></p>

</div>

</div>

</div>

<div class="card">

<h2 class="sectionTitle">

Description

</h2>

<p class="description" id="description"></p>

</div>

<div class="card">

<h2 class="sectionTitle">

Required Skills

</h2>

<div class="skills" id="skills"></div>

</div>

<div class="card">

<h2 class="sectionTitle">

Project Owner

</h2>

<div class="owner">

<div class="avatar"></div>

<div>

<div class="ownerName" id="ownerName"></div>

<div class="ownerRole">

Project Creator

</div>

</div>

</div>

<div class="actions">

<button
class="btn apply"
id="applyBtn"
>

Apply Now

</button>

<a
href="browse.html"
class="btn back"
>

Back

</a>

</div>

</div>

</div>

</div>

</div>

<script src="../js/config.js"></script>

<script src="../js/project.js"></script>

</body>

</html>
