<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Create Project | Projexa</title>

    <link rel="stylesheet" href="../css/main.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{

            background:#f4f7fb;

        }

        .navbar{

            background:#4F46E5;
            color:white;
            padding:18px 30px;

            display:flex;
            justify-content:space-between;
            align-items:center;

        }

        .navbar h2{

            margin:0;

        }

        .navbar a{

            color:white;
            text-decoration:none;
            background:rgba(255,255,255,.2);
            padding:10px 18px;
            border-radius:8px;

        }

        .container{

            width:700px;
            max-width:95%;

            margin:40px auto;

            background:white;

            padding:30px;

            border-radius:15px;

            box-shadow:0 10px 25px rgba(0,0,0,.1);

        }

        h1{

            margin-bottom:25px;
            color:#4F46E5;

        }

        label{

            font-weight:bold;

            display:block;

            margin-top:18px;

        }

        input,
        textarea,
        select{

            width:100%;

            margin-top:8px;

            padding:12px;

            border:1px solid #ccc;

            border-radius:8px;

            font-size:15px;

        }

        textarea{

            resize:none;
            height:140px;

        }

        button{

            margin-top:25px;

            width:100%;

            background:#4F46E5;

            color:white;

            border:none;

            padding:15px;

            font-size:17px;

            border-radius:10px;

            cursor:pointer;

            transition:.3s;

        }

        button:hover{

            background:#4338CA;

        }

    </style>

</head>

<body>

    <div class="navbar">

        <h2>🚀 PROJEXA</h2>

        <a href="dashboard.html">

            ← Dashboard

        </a>

    </div>

    <div class="container">

        <h1>Create New Project</h1>

        <form id="projectForm">

            <label>

                Project Title

            </label>

            <input
                type="text"
                id="title"
                placeholder="Enter Project Title"
                required>

            <label>

                Description

            </label>

            <textarea
                id="description"
                placeholder="Describe your project..."
                required></textarea>

            <label>

                Category

            </label>

            <select id="category">

                <option>Robotics</option>
                <option>AI / ML</option>
                <option>IoT</option>
                <option>Electronics</option>
                <option>Mechanical</option>
                <option>Software</option>
                <option>Web Development</option>
                <option>Mobile App</option>

            </select>

            <label>

                Budget (₹)

            </label>

            <input
                type="number"
                id="budget"
                placeholder="Enter Budget">

            <label>

                Deadline

            </label>

            <input
                type="date"
                id="deadline">

            <button type="submit">

                🚀 Create Project

            </button>

        </form>

    </div>

    <!-- IMPORTANT -->
    <script src="../js/post-project.js"></script>

</body>

</html>
