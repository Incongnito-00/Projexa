<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Post Project | Projexa</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#090909;
color:#fff;
}

.wrapper{
display:flex;
min-height:100vh;
}

.sidebar{
width:260px;
background:#111;
border-right:1px solid #222;
padding:25px;
position:fixed;
left:0;
top:0;
bottom:0;
}

.logo{
font-size:28px;
font-weight:800;
color:#A6FF00;
margin-bottom:40px;
}

.menu{
display:flex;
flex-direction:column;
gap:12px;
}

.menu a{
padding:14px 18px;
border-radius:10px;
text-decoration:none;
color:#ddd;
transition:.3s;
}

.menu a:hover{
background:#1d1d1d;
color:#A6FF00;
}

.menu a.active{
background:#A6FF00;
color:#000;
font-weight:700;
}

.main{
margin-left:260px;
width:calc(100% - 260px);
padding:40px;
}

.pageTitle{
font-size:38px;
font-weight:800;
margin-bottom:10px;
}

.pageSubtitle{
color:#888;
margin-bottom:35px;
}

.formCard{

background:#131313;
border:1px solid #222;
border-radius:18px;
padding:35px;

}

.grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;

}

.field{

display:flex;
flex-direction:column;
gap:10px;

}

label{

font-weight:600;

}

input,
select,
textarea{

background:#1b1b1b;
border:1px solid #333;
color:#fff;
padding:15px;
border-radius:10px;
outline:none;
font-size:15px;

}

textarea{

resize:vertical;
min-height:180px;

}

.full{

grid-column:1/-1;

}

.actions{

margin-top:30px;
display:flex;
gap:20px;
flex-wrap:wrap;

}

button{

padding:15px 35px;
border:none;
border-radius:10px;
font-size:16px;
font-weight:700;
cursor:pointer;

}

.publish{

background:#A6FF00;
color:#000;

}

.reset{

background:#222;
color:#fff;

}

.success{

margin-top:20px;
padding:15px;
border-radius:10px;
display:none;
background:#1c3520;
color:#7CFF8A;

}

.error{

margin-top:20px;
padding:15px;
border-radius:10px;
display:none;
background:#3b1a1a;
color:#ff9b9b;

}

@media(max-width:900px){

.sidebar{
position:relative;
width:100%;
height:auto;
}

.wrapper{
flex-direction:column;
}

.main{
margin:0;
width:100%;
}

}

</style>

</head>

<body>

<div class="wrapper">

<div class="sidebar">

<div class="logo">

PROJEXA

</div>

<div class="menu">

<a href="dashboard.html">Dashboard</a>

<a href="browse.html">Browse Projects</a>

<a href="post-project.html" class="active">Post Project</a>

<a href="applications.html">Applications</a>

<a href="profile.html">Profile</a>

<a href="settings.html">Settings</a>

<a href="../index.html">Logout</a>

</div>

</div>

<div class="main">

<h1 class="pageTitle">

Post New Project

</h1>

<p class="pageSubtitle">

Find teammates, developers and collaborators for your next big idea.

</p>

<div class="formCard">

<form id="projectForm">

<div class="grid">

<div class="field">

<label>Project Title</label>

<input
type="text"
id="title"
required
placeholder="Enter project title">

</div>

<div class="field">

<label>Category</label>

<select id="category" required>

<option value="">Select</option>

<option>Web Development</option>

<option>Mobile App</option>

<option>AI</option>

<option>Machine Learning</option>

<option>IoT</option>

<option>Cyber Security</option>

<option>Mechanical</option>

<option>Electronics</option>

<option>Embedded Systems</option>

</select>

</div>

<div class="field">

<label>Difficulty</label>

<select id="level">

<option>Beginner</option>

<option>Intermediate</option>

<option>Advanced</option>

</select>

</div>

<div class="field">

<label>Status</label>

<select id="status">

<option>Open</option>

<option>Hiring</option>

<option>In Progress</option>

</select>

</div>

<div class="field full">

<label>Required Skills</label>

<input
type="text"
id="skills"
placeholder="React, Node.js, Python, ESP32">

</div>

<div class="field full">

<label>Description</label>

<textarea
id="description"
required
placeholder="Describe your project..."></textarea>

</div>

</div>

<div class="actions">

<button
type="submit"
class="publish"
id="submitBtn">

Publish Project

</button>

<button
type="reset"
class="reset">

Reset

</button>

</div>

<div
class="success"
id="successBox">

Project published successfully.

</div>

<div
class="error"
id="errorBox">

Something went wrong.

</div>

</form>

</div>

</div>

</div>

<script src="../js/config.js"></script>
<script src="../js/post-project.js"></script>

</body>

</html>
